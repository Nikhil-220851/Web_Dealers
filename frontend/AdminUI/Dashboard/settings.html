<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LoanPro Admin — Settings</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .settings-form { max-width: 600px; }
    .settings-form .form-label { color: var(--text-2); font-weight: 500; font-size: 0.9rem; margin-bottom: 0.5rem; }
    .settings-form .form-control {
      background: rgba(255, 255, 255, 0.03); 
      border: 1px solid rgba(255, 255, 255, 0.08); 
      color: #fff;
      padding: 0.75rem 1rem;
      border-radius: var(--rad-sm);
    }
    .settings-form .form-control:focus {
      background: rgba(99, 102, 241, 0.05);
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }
    .btn-save {
      background: var(--primary); color: #fff; border: none; padding: 0.75rem 1.5rem;
      border-radius: var(--rad-sm); font-weight: 600; transition: all 0.2s;
    }
    .btn-save:hover { background: var(--primary-glow); transform: translateY(-1px); }
  </style>
</head>
<body>

  <!-- Overlay -->
  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <span class="material-icons-round">admin_panel_settings</span>
      <span>LoanPro Admin</span>
    </div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Main</div>
      <a href="dashboard.html"><span class="material-icons-round">dashboard</span> Dashboard</a>
      <a href="loan-requests.html"><span class="material-icons-round">credit_card</span> Loan Requests</a>
      <a href="borrowers.html"><span class="material-icons-round">groups</span> Borrowers</a>
      <div class="sidebar-section-label">Insights</div>
      <a href="analytics.html"><span class="material-icons-round">show_chart</span> Analytics</a>
      <div class="sidebar-section-label">Account</div>
      <a href="settings.html" class="active"><span class="material-icons-round">settings</span> Settings</a>
      <a href="#" onclick="logout(); return false;"><span class="material-icons-round">logout</span> Logout</a>
    </nav>
  </aside>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-left">
      <button class="hamburger" onclick="toggleSidebar()">
        <span></span><span></span><span></span>
      </button>
      <a class="brand-name" href="dashboard.html">
        <span class="t1">Loan</span><span class="t2">Pro</span>
      </a>
    </div>
    <div class="navbar-right">
      <div class="admin-badge">
        <div class="admin-avatar" id="adminAvatar">A</div>
        <div class="admin-info">
          <span class="admin-name" id="adminName">Loading…</span>
          <span class="admin-role" id="adminRole"></span>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">
        <span class="material-icons-round">logout</span>
      </button>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="dashboard">

    <div class="page-heading">
      <h1>Settings</h1>
      <p>Configure administrator preferences and account details.</p>
    </div>

    <!-- Admin Profile Settings -->
    <div class="panel" style="--delay:0.05s">
      <div class="panel-header">
        <div class="panel-title">
          <div class="panel-icon-wrap"><span class="material-icons-round">manage_accounts</span></div>
          Admin Profile Settings
        </div>
      </div>
      <div class="p-4">
        <form id="settingsForm" class="settings-form">
          <div class="mb-3">
            <label class="form-label">Email Address (Read-Only)</label>
            <input type="email" class="form-control" id="settingsEmail" readonly>
          </div>
          <div class="row gx-3 mb-3">
            <div class="col-md-6">
              <label class="form-label">First Name</label>
              <input type="text" class="form-control" id="settingsFirstName" required>
            </div>
            <div class="col-md-6">
              <label class="form-label">Last Name</label>
              <input type="text" class="form-control" id="settingsLastName" required>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label">Change Password (Leave blank to keep current)</label>
            <input type="password" class="form-control" id="settingsPassword" placeholder="New password">
          </div>
          <button type="submit" class="btn-save" id="btnSaveParams">
            <span class="material-icons-round" style="font-size: 1.1rem; vertical-align: middle; margin-right: 4px;">save</span> Save Changes
          </button>
          <div id="settingsMsg" class="mt-3" style="display:none; font-size:0.9rem;"></div>
        </form>
      </div>
    </div>

  </main>

  <script src="admin-common.js"></script>
  <script src="settings.js"></script>
</body>
</html>
