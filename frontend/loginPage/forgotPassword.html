<!doctype html>
<html>
  <head>
    <title>Reset Password</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f4f7ff;
      }

      .card {
        background: white;
        width: 380px;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        text-align: center;
      }

      h2 {
        color: #1f4e79;
        margin-bottom: 8px;
      }

      .subtitle {
        font-size: 14px;
        color: #777;
        margin-bottom: 20px;
      }

      .step-text {
        font-size: 12px;
        color: #4a90e2;
        margin-bottom: 10px;
      }

      .progress {
        display: flex;
        gap: 5px;
        margin-bottom: 20px;
      }

      .bar {
        flex: 1;
        height: 5px;
        background: #ddd;
        border-radius: 20px;
      }

      .bar.active {
        background: #4a90e2;
      }

      label {
        display: block;
        text-align: left;
        font-size: 13px;
        margin-bottom: 5px;
        color: #555;
      }

      input {
        width: 100%;
        padding: 12px;
        border: 2px solid #ddd;
        border-radius: 8px;
        margin-bottom: 15px;
      }

      input:focus {
        border-color: #4a90e2;
        outline: none;
      }

      button {
        width: 100%;
        padding: 12px;
        border: none;
        background: linear-gradient(135deg, #1f4e79, #4a90e2);
        color: white;
        font-size: 15px;
        border-radius: 8px;
        cursor: pointer;
      }

      button:hover {
        opacity: 0.9;
      }

      .back {
        display: block;
        margin-top: 15px;
        font-size: 13px;
        color: #777;
        text-decoration: none;
      }

      .otp-box {
        display: flex;
        gap: 8px;
        margin-bottom: 15px;
      }

      .otp-box input {
        text-align: center;
        font-size: 20px;
        font-weight: bold;
      }

      .timer {
        font-size: 13px;
        color: #777;
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h2>Reset Password</h2>

      <p class="subtitle">
        Enter your registered email and we'll send you a verification code.
      </p>

      <div class="step-text">STEP <span id="stepNum">1</span> OF 3</div>

      <div class="progress">
        <div class="bar active" id="bar1"></div>
        <div class="bar" id="bar2"></div>
        <div class="bar" id="bar3"></div>
      </div>

      <div id="step1">
        <label>Email Address</label>

        <input
          type="email"
          id="email"
          placeholder="Enter your registered email"
          required
        />

        <button onclick="generateOTP()">Generate OTP</button>
      </div>

      <div id="step2" style="display: none">
        <label>Enter OTP</label>

        <div class="otp-box">
          <input maxlength="1" id="o1" oninput="moveNext(this, 'o2')" />
          <input maxlength="1" id="o2" oninput="moveNext(this, 'o3')" />
          <input maxlength="1" id="o3" oninput="moveNext(this, 'o4')" />
          <input maxlength="1" id="o4" oninput="moveNext(this, 'o5')" />
          <input maxlength="1" id="o5" oninput="moveNext(this, 'o6')" />
          <input maxlength="1" id="o6" />
        </div>

        <button onclick="verifyOTP()">Verify OTP</button>

        <p class="timer">
          Didn't receive OTP? Wait <span id="timer">30</span>s
        </p>

        <button
          id="resendBtn"
          onclick="regenerateOTP()"
          disabled
          style="margin-top: 8px; background: #777"
        >
          Resend OTP
        </button>
      </div>

      <div id="step3" style="display: none">
        <label>New Password</label>

        <input type="password" id="newPassword" />

        <label>Confirm Password</label>

        <input type="password" id="confirmPassword" />

        <button onclick="resetPassword()">Reset Password</button>
      </div>

      <a class="back" href="loginPage.html">Back to Login</a>
    </div>

    <script src="forgot.js"></script>
  </body>
</html>
