<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply for Loan — LoanPro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="../assets/css/base.css">
  <link rel="stylesheet" href="../assets/css/apply-loan.css">
  <style>
    /* ── Loan Card Grid ── */
    #loanCardsGrid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 24px;
    }
    @media (max-width: 900px) {
      #loanCardsGrid { grid-template-columns: 1fr; }
    }

    /* ── Loan Card Component ── */
    .loan-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      transition: box-shadow 0.25s, transform 0.25s, border-color 0.25s;
    }
    .loan-card:hover {
      box-shadow: 0 8px 28px rgba(108,71,255,.13);
      transform: translateY(-3px);
      border-color: rgba(108,71,255,.3);
    }

    .loan-card-header {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .loan-card-bank-avatar {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
      letter-spacing: .5px;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 4px;
      overflow: hidden;
    }
    .bank-logo {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .loan-card-info { flex: 1; min-width: 0; }
    .loan-card-bank-name {
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .loan-card-type {
      font-size: 18px;
      font-weight: 700;
      color: var(--text1);
      font-family: var(--font-d);
    }

    .loan-card-badge {
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-low  { background: var(--green-bg); color: var(--green); }
    .badge-high { background: #ede9fe; color: #6C47FF; }

    .loan-card-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .loan-card-stat {
      background: var(--bg);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .loan-card-stat-label {
      font-size: 10.5px;
      color: var(--text3);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: .6px;
    }
    .loan-card-stat-value {
      font-size: 15px;
      font-weight: 700;
      color: var(--text1);
    }

    .loan-card-btn {
      height: 44px;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 10px;
    }
    .loan-card-btn i { font-size: 16px; transition: transform .2s; }
    .loan-card-btn:hover i { transform: translateX(4px); }
  </style>
</head>

<body>

  <div class="shell">
    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-mark">L</div>
        <div class="logo-text">Loan<span>Pro</span></div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">Main Menu</div>
        <a href="dashboard.html" class="nav-item">
          <span class="nav-icon"><i class="ph ph-squares-four"></i></span> <span class="nav-label">Dashboard</span>
        </a>
        <a href="apply-loan.html" class="nav-item active">
          <span class="nav-icon"><i class="ph ph-sparkle"></i></span> <span class="nav-label">Apply for Loans</span>
        </a>
        <a href="my-loans.html" class="nav-item">
          <span class="nav-icon"><i class="ph ph-clipboard-text"></i></span> <span class="nav-label">My Loans</span>
        </a>
        <a href="payment-history.html" class="nav-item">
          <span class="nav-icon"><i class="ph ph-credit-card"></i></span> <span class="nav-label">Payment History</span>
        </a>
        <a href="emi-calculator.html" class="nav-item">
          <span class="nav-icon"><i class="ph ph-calculator"></i></span> <span class="nav-label">EMI Calculator</span>
        </a>
        <a href="profile.html" class="nav-item">
          <span class="nav-icon"><i class="ph ph-user"></i></span> <span class="nav-label">Profile</span>
        </a>

        <a href="notifications.html" class="nav-item">
          <span class="nav-icon"><i class="ph ph-bell"></i></span> <span class="nav-label">Notifications</span>
        </a>

        <div class="nav-section" style="margin-top:10px">Support</div>
        <a href="help-center.html" class="nav-item">
          <span class="nav-icon"><i class="ph ph-question"></i></span> <span class="nav-label">Help Center</span>
        </a>
        <a href="contact.html" class="nav-item">
          <span class="nav-icon"><i class="ph ph-phone"></i></span> <span class="nav-label">Contact Us</span>
        </a>
      
        <div class="nav-section" style="margin-top:10px">Account</div>
        <a href="#" class="nav-item" onclick="logout()">
          <span class="nav-icon"><i class="ph ph-sign-out"></i></span> <span class="nav-label">Logout</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <a href="profile.html" class="user-chip">
          <div class="u-avatar" id="sidebar-avatar-letter">?</div>
          <div class="u-details">
            <div class="u-name" id="sidebar-user-name">Loading…</div>
            <div class="u-role">Borrower</div>
          </div>
          <span class="u-settings-icon"><i class="ph ph-gear"></i></span>
        </a>
      </div>
    </aside>

    <main class="main">
      <!-- TOPBAR -->
      <header class="topbar">
        <div class="topbar-left">
          <div>
            <h1>Apply for Loans</h1>
            <div class="topbar-sub">Find the best loan for you</div>
          </div>
        </div>
        <div class="topbar-right">
          <div class="icon-btn" onclick="toggleNotifications()"><i class="ph ph-bell"></i><span class="notif-dot"></span></div>
        </div>
      </header>

      <!-- PAGE CONTENT -->
      <div class="page-body active" style="padding:24px">

        <!-- Filter Bar -->
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:28px">
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;align-items:end">
            <div>
              <label class="input-lbl">Loan Type</label>
              <select class="input-field" id="filter-loan-type">
                <option>All Types</option>
                <option>Personal Loan</option>
                <option>Home Loan</option>
                <option>Car Loan</option>
                <option>Education Loan</option>
                <option>Business Loan</option>
              </select>
            </div>
            <div>
              <label class="input-lbl">Bank</label>
              <select class="input-field" id="filter-bank">
                <option>All Banks</option>
                <option>HDFC Bank</option>
                <option>State Bank of India</option>
                <option>ICICI Bank</option>
                <option>Axis Bank</option>
                <option>Kotak Mahindra Bank</option>
              </select>
            </div>
            <div>
              <label class="input-lbl">Min Amount: <span id="filter-amt-display" style="color:var(--primary);font-weight:700">&#8377;50,000</span></label>
              <input type="range" class="w-full" id="filter-amount" min="50000" max="5000000" step="50000" value="50000" />
            </div>
            <div>
              <button class="btn btn-primary w-full" id="btn-search-loans" style="height:42px">
                <i class="ph ph-magnifying-glass"></i> Search
              </button>
            </div>
          </div>
        </div>

        <!-- Loan Cards Grid -->
        <div id="loanCardsGrid"></div>

      </div>
    </main>
  </div>

  <script src="../assets/js/base.js"></script>
  <script src="../assets/js/apply-loan.js"></script>
  <script>
    function logout() { localStorage.clear(); window.location.href='../landing/index.html'; }
    window.addEventListener('DOMContentLoaded', () => { if (localStorage.getItem('isLoggedIn') !== 'true') window.location.href='../auth/login.html'; });
  </script>

</body>

</html>
